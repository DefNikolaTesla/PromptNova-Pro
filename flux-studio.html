<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>FLUX Studio</title>
  <meta name="description" content="AI Image Generation Studio"/>
  <meta name="theme-color" content="#080808"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FLUX"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #080808;
      --surface: #111;
      --surface2: #1a1a1a;
      --border: #242424;
      --accent: #c8f542;
      --accent2: #7df5c8;
      --text: #f0f0f0;
      --muted: #555;
      --danger: #f54242;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* INSTALL BANNER */
    #install-banner {
      display: none; align-items: center; gap: 10px;
      padding: 10px 16px; background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    #install-banner.visible { display: flex; }
    .install-text { font-size: 11px; color: var(--muted); flex: 1; line-height: 1.4; }
    .install-btn {
      flex-shrink: 0; padding: 7px 14px; background: var(--accent);
      border: none; border-radius: 6px; color: #080808;
      font-family: 'DM Mono', monospace; font-size: 11px;
      font-weight: 500; cursor: pointer; letter-spacing: 1px;
    }
    .install-close {
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; padding: 2px; line-height: 1;
    }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: baseline; gap: 7px; }
    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 4px; color: var(--accent); line-height: 1;
    }
    .logo-sub { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .gen-count { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    /* MAIN */
    main { flex: 1; padding: 0 16px; overflow-y: auto; }

    /* CANVAS */
    .canvas-area { margin: 16px 0 12px; }
    .canvas-wrap {
      width: 100%; aspect-ratio: 1; border-radius: 14px; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border);
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .canvas-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; opacity: 0; transition: opacity 0.5s ease;
    }
    .canvas-wrap img.loaded { opacity: 1; }

    .placeholder {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      pointer-events: none; transition: opacity 0.3s;
    }
    .placeholder.hidden { opacity: 0; }
    .placeholder-glyph { font-size: 52px; opacity: 0.12; animation: float 4s ease-in-out infinite; }
    @keyframes float {
      0%,100% { transform: translateY(0); opacity: 0.12; }
      50% { transform: translateY(-6px); opacity: 0.2; }
    }
    .placeholder-hint { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

    /* LOADING */
    .loading-overlay {
      position: absolute; inset: 0; background: rgba(8,8,8,0.88);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; opacity: 0; pointer-events: none;
      transition: opacity 0.2s; border-radius: 13px;
    }
    .loading-overlay.active { opacity: 1; pointer-events: all; }
    .spinner {
      width: 38px; height: 38px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-stage { font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

    /* IMAGE ACTIONS */
    .image-actions {
      display: flex; gap: 8px; margin-top: 10px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .image-actions.visible { opacity: 1; pointer-events: all; }
    .action-btn {
      flex: 1; padding: 9px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .action-btn:active { background: var(--surface2); color: var(--text); border-color: var(--accent); }

    .section-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }

    /* STYLE CHIPS */
    .styles-section { margin-bottom: 14px; }
    .chips-scroll {
      display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
      padding-bottom: 2px; -webkit-overflow-scrolling: touch;
    }
    .chips-scroll::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 12px; border-radius: 100px;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .chip.active { background: var(--accent); color: #080808; border-color: var(--accent); }

    /* SETTINGS */
    .settings-strip { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
    .settings-strip::-webkit-scrollbar { display: none; }
    .setting-pill { display: flex; flex-direction: column; gap: 4px; min-width: 84px; }
    .setting-pill label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .setting-pill select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px;
      padding: 6px 8px; cursor: pointer; -webkit-appearance: none; appearance: none; outline: none;
    }
    .setting-pill select:focus { border-color: var(--accent); }

    /* PROMPT */
    .prompt-section { margin-bottom: 14px; }
    .prompt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }

    /* AI TOGGLE */
    .ai-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .ai-toggle input { display: none; }
    .ai-track {
      width: 38px; height: 21px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 100px; position: relative;
      transition: background 0.2s, border-color 0.2s; flex-shrink: 0;
    }
    .ai-track::after {
      content: ''; position: absolute; width: 15px; height: 15px;
      background: var(--muted); border-radius: 50%; top: 2px; left: 2px;
      transition: transform 0.2s, background 0.2s;
    }
    .ai-toggle:has(input:checked) .ai-track { background: var(--accent); border-color: var(--accent); }
    .ai-toggle:has(input:checked) .ai-track::after { transform: translateX(17px); background: #080808; }
    .ai-toggle-label {
      font-size: 10px; letter-spacing: 1.5px; color: var(--muted);
      text-transform: uppercase; transition: color 0.2s;
      display: flex; align-items: center; gap: 5px;
    }
    .ai-toggle:has(input:checked) .ai-toggle-label { color: var(--accent); }
    .ai-badge {
      font-size: 8px; background: var(--accent); color: #080808;
      padding: 1px 5px; border-radius: 3px; font-weight: 600; letter-spacing: 1px;
    }

    .prompt-wrap { position: relative; }
    textarea {
      width: 100%; min-height: 80px; padding: 12px 14px; padding-right: 44px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
      line-height: 1.6; resize: none; outline: none;
      transition: border-color 0.2s; caret-color: var(--accent);
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--accent2); }
    .char-count { position: absolute; bottom: 10px; right: 12px; font-size: 9px; color: var(--muted); letter-spacing: 1px; }

    /* ENHANCED PREVIEW */
    .enhanced-box {
      margin-top: 8px; border: 1px solid var(--accent2); border-radius: 10px;
      background: rgba(125,245,200,0.04); overflow: hidden; display: none;
    }
    .enhanced-box.visible { display: block; }
    .enhanced-box-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-bottom: 1px solid rgba(125,245,200,0.12);
    }
    .enhanced-box-label {
      font-size: 9px; letter-spacing: 2px; color: var(--accent2);
      text-transform: uppercase; display: flex; align-items: center; gap: 6px;
    }
    .enhanced-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent2);
      animation: pdot 1.4s ease-in-out infinite;
    }
    @keyframes pdot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.3; transform:scale(0.7); } }
    .enhanced-dot.done { animation: none; }
    .enhanced-actions { display: none; align-items: center; gap: 6px; }
    .enhanced-actions.visible { display: flex; }
    .enhanced-copy-btn {
      font-size: 9px; letter-spacing: 1px; color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px;
      font-family: 'DM Mono', monospace; cursor: pointer; text-transform: uppercase;
      transition: all 0.15s; display: flex; align-items: center; gap: 4px;
    }
    .enhanced-copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .enhanced-copy-btn.copied { color: var(--accent); border-color: var(--accent); background: rgba(200,245,66,0.08); }
    .enhanced-use-btn {
      font-size: 9px; letter-spacing: 1px; color: var(--accent2); background: none;
      border: 1px solid rgba(125,245,200,0.3); border-radius: 4px; padding: 3px 8px;
      font-family: 'DM Mono', monospace; cursor: pointer; text-transform: uppercase;
      transition: all 0.15s;
    }
    .enhanced-use-btn:hover { background: rgba(125,245,200,0.1); }
    .enhanced-text {
      padding: 10px 12px; font-size: 11px; line-height: 1.7;
      color: rgba(240,240,240,0.75); min-height: 44px;
    }
    .enhanced-text.typing::after { content: '▋'; color: var(--accent2); animation: blink 0.6s step-end infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    /* NEG PROMPT */
    .neg-toggle {
      display: flex; align-items: center; gap: 6px; background: none; border: none;
      color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
      padding: 8px 0 4px; transition: color 0.15s;
    }
    .neg-toggle:hover { color: var(--text); }
    .neg-arrow { font-size: 8px; transition: transform 0.2s; }
    .neg-toggle.open .neg-arrow { transform: rotate(90deg); }
    .neg-area { display: none; margin-top: 6px; }
    .neg-area.open { display: block; }
    .neg-area textarea { min-height: 52px; font-size: 12px; border-color: var(--surface2); }

    /* GENERATE */
    .generate-btn {
      width: 100%; padding: 16px; background: var(--accent); border: none;
      border-radius: 10px; color: #080808; font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 4px; cursor: pointer; transition: all 0.15s;
      position: relative; overflow: hidden; margin-bottom: 20px;
    }
    .generate-btn:active { transform: scale(0.98); }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-shine {
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      animation: shine 2.5s ease-in-out infinite;
    }
    @keyframes shine { 0% { left:-100%; } 50%,100% { left:150%; } }

    /* HISTORY */
    .history-section { margin-bottom: 24px; }
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .clear-btn {
      background: none; border: none; color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--danger); }
    .history-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .history-thumb {
      aspect-ratio: 1; border-radius: 7px; overflow: hidden;
      border: 1px solid var(--border); cursor: pointer;
      background: var(--surface); transition: all 0.15s;
    }
    .history-thumb:active { border-color: var(--accent); transform: scale(0.97); }
    .history-thumb img { width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.4s; display:block; }
    .history-thumb img.loaded { opacity:1; }
    .history-empty { grid-column:span 3; text-align:center; padding:28px; color:var(--muted); font-size:11px; letter-spacing:1px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%;
      transform: translateX(-50%) translateY(80px); background: var(--surface2);
      border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px;
      border-radius: 100px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 200; white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>
  <div id="install-banner">
    <span class="install-text">Add FLUX Studio to your home screen.</span>
    <button class="install-btn" id="install-btn">Install</button>
    <button class="install-close" id="install-close">×</button>
  </div>

  <header>
    <div class="logo">
      <span class="logo-text">FLUX</span>
      <span class="logo-sub">Studio</span>
    </div>
    <span class="gen-count" id="gen-count">0 generated</span>
  </header>

  <main>
    <div class="canvas-area">
      <div class="canvas-wrap">
        <img id="output-img" alt="Generated image"/>
        <div class="placeholder" id="placeholder">
          <div class="placeholder-glyph">⚡</div>
          <span class="placeholder-hint">Enter a prompt below</span>
        </div>
        <div class="loading-overlay" id="loading-overlay">
          <div class="spinner"></div>
          <span class="loading-stage" id="loading-stage">Enhancing prompt</span>
        </div>
      </div>
      <div class="image-actions" id="image-actions">
        <button class="action-btn" id="save-btn">↓ Save</button>
        <button class="action-btn" id="share-btn">↗ Share</button>
        <button class="action-btn" id="retry-btn">↺ Retry</button>
      </div>
    </div>

    <div class="styles-section">
      <div class="section-label">Style</div>
      <div class="chips-scroll">
        <button class="chip active" data-style="">None</button>
        <button class="chip" data-style="photorealistic, hyperdetailed, DSLR photography, 8k resolution">Photo</button>
        <button class="chip" data-style="digital art, artstation, trending, concept art, vivid colors">Digital Art</button>
        <button class="chip" data-style="oil painting, impressionist brushstrokes, thick impasto, canvas texture">Oil Paint</button>
        <button class="chip" data-style="cinematic, film grain, anamorphic lens flare, dramatic lighting, color graded">Cinematic</button>
        <button class="chip" data-style="anime style, studio ghibli inspired, hand drawn, vibrant illustration">Anime</button>
        <button class="chip" data-style="3D render, octane render, subsurface scattering, ray tracing, physically based">3D Render</button>
        <button class="chip" data-style="watercolor, soft bleeding edges, wet on wet, paper texture, transparent washes">Watercolor</button>
        <button class="chip" data-style="neon lights, cyberpunk, synthwave, rain reflections, futuristic city">Cyberpunk</button>
        <button class="chip" data-style="pixel art, 16-bit retro, dithering, game sprite, limited palette">Pixel Art</button>
        <button class="chip" data-style="pencil sketch, graphite shading, cross-hatching, hand drawn, paper texture">Sketch</button>
        <button class="chip" data-style="fantasy art, magical atmosphere, ethereal glow, epic scale, mythical">Fantasy</button>
      </div>
    </div>

    <div class="settings-strip">
      <div class="setting-pill">
        <label>Ratio</label>
        <select id="ratio-select">
          <option value="1024x1024">1:1 Square</option>
          <option value="768x1024">3:4 Portrait</option>
          <option value="1024x768">4:3 Landscape</option>
          <option value="576x1024">9:16 Story</option>
          <option value="1024x576">16:9 Wide</option>
        </select>
      </div>
      <div class="setting-pill">
        <label>Model</label>
        <select id="model-select">
          <option value="flux">Flux</option>
          <option value="flux-realism">Flux Realism</option>
          <option value="flux-anime">Flux Anime</option>
          <option value="flux-3d">Flux 3D</option>
          <option value="turbo">Turbo (Fast)</option>
        </select>
      </div>
      <div class="setting-pill">
        <label>Seed</label>
        <select id="seed-select">
          <option value="random">Random</option>
          <option value="fixed">Fixed</option>
        </select>
      </div>
    </div>

    <div class="prompt-section">
      <div class="prompt-header">
        <div class="section-label" style="margin:0">Prompt</div>
        <label class="ai-toggle">
          <input type="checkbox" id="ai-enhance-toggle" checked/>
          <div class="ai-track"></div>
          <span class="ai-toggle-label">
            <span class="ai-badge">AI</span> Enhance
          </span>
        </label>
      </div>

      <div class="prompt-wrap">
        <textarea
          id="prompt-input"
          placeholder="e.g. a lone wolf on a mountain at sunset..."
          rows="3"
          maxlength="4000"
        ></textarea>
        <span class="char-count" id="char-count">0/4000</span>
      </div>

      <div class="enhanced-box" id="enhanced-box">
        <div class="enhanced-box-header">
          <span class="enhanced-box-label">
            <span class="enhanced-dot" id="enhanced-dot"></span>
            Enhanced prompt
          </span>
          <div class="enhanced-actions" id="enhanced-actions">
            <button class="enhanced-copy-btn" id="enhanced-copy-btn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              Copy
            </button>
            <button class="enhanced-use-btn" id="enhanced-use-btn">↑ Use</button>
          </div>
        </div>
        <div class="enhanced-text" id="enhanced-text"></div>
      </div>

      <button class="neg-toggle" id="neg-toggle">
        <span class="neg-arrow">▶</span> Negative prompt
      </button>
      <div class="neg-area" id="neg-area">
        <textarea
          id="neg-input"
          placeholder="Things to exclude... (blurry, watermark, ugly, distorted)"
          rows="2"
        ></textarea>
      </div>
    </div>

    <button class="generate-btn" id="generate-btn">
      <div class="btn-shine"></div>
      Generate
    </button>

    <div class="history-section">
      <div class="history-header">
        <span class="section-label" style="margin:0">History</span>
        <button class="clear-btn" id="clear-history">Clear all</button>
      </div>
      <div class="history-grid" id="history-grid">
        <div class="history-empty">No images yet</div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // ── INLINE MANIFEST ──────────────────────────────────────────────
    const manifestData = {
      name: "FLUX Studio", short_name: "FLUX",
      description: "AI Image Generation Studio",
      start_url: "./", display: "standalone",
      background_color: "#080808", theme_color: "#080808",
      orientation: "portrait-primary",
      icons: [
        { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%23080808'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='110' font-family='serif'>⚡</text></svg>", sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
        { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%23080808'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='300' font-family='serif'>⚡</text></svg>", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
      ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = URL.createObjectURL(manifestBlob);
    document.head.appendChild(manifestLink);

    const appleIcon = document.createElement('link');
    appleIcon.rel = 'apple-touch-icon';
    appleIcon.href = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23080808'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='100' font-family='serif'>⚡</text></svg>";
    document.head.appendChild(appleIcon);

    // ── INLINE SERVICE WORKER ────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'flux-v1';
        self.addEventListener('install', e => { self.skipWaiting(); });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
          ));
          self.clients.claim();
        });
        self.addEventListener('fetch', e => {
          if (e.request.url.includes('pollinations.ai') || e.request.url.includes('anthropic.com')) return;
          e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
            if (res && res.status === 200 && e.request.method === 'GET') {
              caches.open(CACHE).then(c => c.put(e.request, res.clone()));
            }
            return res;
          })));
        });
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(swBlob), { scope: '/' }).catch(() => {});
    }

    // ── STATE ────────────────────────────────────────────────────────
    let genCount = 0;
    let currentStyle = '';
    let currentImgUrl = '';
    let currentSeed = Math.floor(Math.random() * 9999999);
    let history = JSON.parse(localStorage.getItem('flux_history') || '[]');
    let deferredPrompt = null;
    let enhancedPromptText = '';
    let enhanceDebounce = null;

    // ── ELEMENTS ─────────────────────────────────────────────────────
    const promptInput     = document.getElementById('prompt-input');
    const negInput        = document.getElementById('neg-input');
    const outputImg       = document.getElementById('output-img');
    const generateBtn     = document.getElementById('generate-btn');
    const loadingOverlay  = document.getElementById('loading-overlay');
    const loadingStage    = document.getElementById('loading-stage');
    const placeholder     = document.getElementById('placeholder');
    const imageActions    = document.getElementById('image-actions');
    const historyGrid     = document.getElementById('history-grid');
    const genCountEl      = document.getElementById('gen-count');
    const charCountEl     = document.getElementById('char-count');
    const toast           = document.getElementById('toast');
    const negToggle       = document.getElementById('neg-toggle');
    const negArea         = document.getElementById('neg-area');
    const aiToggle        = document.getElementById('ai-enhance-toggle');
    const enhancedBox     = document.getElementById('enhanced-box');
    const enhancedText    = document.getElementById('enhanced-text');
    const enhancedDot     = document.getElementById('enhanced-dot');
    const enhancedUseBtn  = document.getElementById('enhanced-use-btn');
    const enhancedActions = document.getElementById('enhanced-actions');

    // ── CHAR COUNT ───────────────────────────────────────────────────
    promptInput.addEventListener('input', () => {
      charCountEl.textContent = `${promptInput.value.length}/4000`;
      scheduleEnhance();
    });

    // ── NEG TOGGLE ───────────────────────────────────────────────────
    negToggle.addEventListener('click', () => {
      negToggle.classList.toggle('open');
      negArea.classList.toggle('open');
    });

    // ── STYLE CHIPS ──────────────────────────────────────────────────
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentStyle = chip.dataset.style;
        scheduleEnhance();
      });
    });

    // ── AI TOGGLE ────────────────────────────────────────────────────
    aiToggle.addEventListener('change', () => {
      if (aiToggle.checked && promptInput.value.trim().length > 3) {
        scheduleEnhance();
      } else {
        clearEnhanced();
      }
    });

    function clearEnhanced() {
      enhancedBox.classList.remove('visible');
      enhancedActions.classList.remove('visible');
      enhancedPromptText = '';
    }

    // ── AUTO-ENHANCE SCHEDULER ───────────────────────────────────────
    function scheduleEnhance() {
      clearTimeout(enhanceDebounce);
      const val = promptInput.value.trim();
      if (!aiToggle.checked || val.length < 4) {
        clearEnhanced();
        return;
      }
      enhanceDebounce = setTimeout(() => enhancePrompt(val), 900);
    }

    // ── AI PROMPT ENHANCEMENT ────────────────────────────────────────
    async function enhancePrompt(userPrompt) {
      const styleHint = currentStyle ? `\n\nSelected art style: ${currentStyle}` : '';
      const model = document.getElementById('model-select').value;
      const modelHints = {
        'flux-realism': 'Bias toward photorealistic, hyperdetailed, DSLR-quality descriptors.',
        'flux-anime':   'Bias toward anime/manga art terminology, cel shading, illustration style.',
        'flux-3d':      'Bias toward 3D render terminology: octane, blender, ray tracing, PBR materials.',
        'turbo':        'Keep prompt focused and concise — turbo model performs best with tight prompts.',
        'flux': ''
      };
      const modelHint = modelHints[model] ? `\nModel hint: ${modelHints[model]}` : '';

      enhancedBox.classList.add('visible');
      enhancedText.textContent = '';
      enhancedText.classList.add('typing');
      enhancedDot.classList.remove('done');
      enhancedActions.classList.remove('visible');
      enhancedPromptText = '';

      const system = `You are an elite AI image prompt architect with deep expertise in generative image models (Stable Diffusion, FLUX, Midjourney, DALL-E). Your task is to transform a simple user idea into the most vivid, technically precise, visually stunning prompt possible.

## Your enhancement framework:

**SUBJECT & COMPOSITION**
- Define the main subject with extreme specificity (species, age, expression, pose, action)
- Establish spatial composition: foreground/midground/background layers
- Camera angle: eye-level, low-angle hero shot, bird's eye, dutch tilt, close-up macro
- Lens characteristics: 85mm portrait, 24mm wide, 50mm, fisheye, tilt-shift

**LIGHTING MASTERY**
- Primary light source: golden hour, blue hour, harsh noon sun, overcast diffused, studio key light
- Secondary fill light and rim/backlight effects
- Volumetric effects: god rays, light shafts, atmospheric haze, fog, mist
- Shadows: hard, soft, dappled, cast shadows with direction

**MATERIALS & TEXTURE**
- Surface detail: skin pores, fabric weave, metal oxidation, wood grain, water droplets
- Reflectivity: matte, glossy, iridescent, subsurface scattering (skin, wax, marble)
- Micro-details that catch light

**ATMOSPHERE & MOOD**
- Time of day and season
- Weather conditions
- Emotional tone (serene, epic, melancholic, tense, dreamlike)
- Color palette: warm/cool, complementary, monochromatic, split-toning

**TECHNICAL QUALITY SIGNALS**
Always end with a quality cluster: masterpiece, award-winning, ultra-detailed, sharp focus, 8K UHD, professional photography, perfect exposure, hyperrealistic

## PERMANENT REQUIREMENTS (always include, no exceptions):
1. **Hyper-realism**: The image must look like it was captured by a real smartphone camera in RAW format — natural lens distortion, real-world sensor noise, authentic color science, true-to-life skin tones, candid imperfections, no artificial sharpening or AI-smooth skin, shot with a flagship smartphone (iPhone Pro or Samsung Galaxy Ultra), RAW unprocessed quality, photojournalistic authenticity
2. **Human presence**: Always include a physical human being in the scene — a real person, not illustrated, not stylized, fully embodied, photorealistic human anatomy, natural skin texture, authentic facial features, genuine human expression

## Rules:
- NEVER change the user's core subject — only enrich and expand it
- Always weave the two permanent requirements above naturally into the prompt
- Write as a single flowing prompt, NOT as a list
- Use comma-separated descriptors and natural language fluidly combined
- Output length: up to 500 words — be as rich, layered, and exhaustive as needed
- Output ONLY the prompt — no labels, no explanations, no preamble, no quotes${styleHint}${modelHint}`;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 800,
            system,
            messages: [{ role: 'user', content: userPrompt }],
            stream: true
          })
        });

        if (!res.ok) throw new Error('API error');

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
                fullText += parsed.delta.text;
                enhancedText.textContent = fullText;
              }
            } catch {}
          }
        }

        enhancedText.classList.remove('typing');
        enhancedDot.classList.add('done');
        enhancedPromptText = fullText.trim();
        if (enhancedPromptText) enhancedActions.classList.add('visible');

      } catch {
        clearEnhanced();
      }
    }

    // ── COPY TO CLIPBOARD ────────────────────────────────────────────
    function copyToClipboard(text) {
      return new Promise((resolve, reject) => {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(resolve).catch(() => {
            fallbackCopy(text) ? resolve() : reject();
          });
        } else {
          fallbackCopy(text) ? resolve() : reject();
        }
      });
    }

    function fallbackCopy(text) {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
        document.body.appendChild(ta);
        ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      } catch { return false; }
    }

    document.getElementById('enhanced-copy-btn').addEventListener('click', async () => {
      if (!enhancedPromptText) return;
      const btn = document.getElementById('enhanced-copy-btn');
      try {
        await copyToClipboard(enhancedPromptText);
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
        showToast('Copied to clipboard ✓');
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
        }, 2000);
      } catch { showToast('Copy failed'); }
    });

    // ── USE ENHANCED PROMPT ──────────────────────────────────────────
    enhancedUseBtn.addEventListener('click', () => {
      if (!enhancedPromptText) return;
      promptInput.value = enhancedPromptText;
      charCountEl.textContent = `${enhancedPromptText.length}/4000`;
      clearEnhanced();
      showToast('Enhanced prompt applied ✓');
    });

    // ── GENERATE ─────────────────────────────────────────────────────
    generateBtn.addEventListener('click', generate);
    promptInput.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) generate(); });

    async function generate() {
      let prompt = promptInput.value.trim();
      if (!prompt) { showToast('Enter a prompt first'); promptInput.focus(); return; }

      if (document.getElementById('seed-select').value === 'random') {
        currentSeed = Math.floor(Math.random() * 9999999);
      }

      generateBtn.disabled = true;
      loadingOverlay.classList.add('active');
      imageActions.classList.remove('visible');
      outputImg.classList.remove('loaded');
      placeholder.classList.add('hidden');

      if (aiToggle.checked) {
        if (!enhancedPromptText) {
          loadingStage.textContent = 'Enhancing prompt';
          await enhancePrompt(prompt);
        }
        if (enhancedPromptText) prompt = enhancedPromptText;
      }

      const fullPrompt = [prompt, currentStyle].filter(Boolean).join(', ');
      const neg = negInput.value.trim();
      const [w, h] = document.getElementById('ratio-select').value.split('x');
      const model = document.getElementById('model-select').value;

      const params = new URLSearchParams({
        width: w, height: h, model,
        seed: currentSeed, enhance: 'false', nologo: 'true',
        ...(neg ? { negative_prompt: neg } : {})
      });

      const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?${params}`;
      currentImgUrl = url;
      loadingStage.textContent = 'Generating image';

      try {
        await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = resolve; img.onerror = reject; img.src = url;
        });
        outputImg.src = url;
        outputImg.onload = () => outputImg.classList.add('loaded');
        genCount++;
        genCountEl.textContent = `${genCount} generated`;
        addToHistory(url, fullPrompt);
        loadingOverlay.classList.remove('active');
        imageActions.classList.add('visible');
      } catch {
        loadingOverlay.classList.remove('active');
        placeholder.classList.remove('hidden');
        showToast('Generation failed — try again');
      }

      generateBtn.disabled = false;
    }

    // ── HISTORY ──────────────────────────────────────────────────────
    function addToHistory(url, prompt) {
      history.unshift({ url, prompt, ts: Date.now() });
      if (history.length > 24) history = history.slice(0, 24);
      localStorage.setItem('flux_history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      if (!history.length) { historyGrid.innerHTML = '<div class="history-empty">No images yet</div>'; return; }
      historyGrid.innerHTML = '';
      history.forEach(item => {
        const wrap = document.createElement('div');
        wrap.className = 'history-thumb'; wrap.title = item.prompt;
        const img = document.createElement('img');
        img.alt = item.prompt; img.loading = 'lazy';
        img.onload = () => img.classList.add('loaded');
        img.src = item.url;
        wrap.appendChild(img);
        wrap.addEventListener('click', () => {
          outputImg.classList.remove('loaded');
          outputImg.src = item.url; currentImgUrl = item.url;
          outputImg.onload = () => outputImg.classList.add('loaded');
          placeholder.classList.add('hidden');
          imageActions.classList.add('visible');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        historyGrid.appendChild(wrap);
      });
    }

    document.getElementById('clear-history').addEventListener('click', () => {
      if (!history.length) return;
      history = []; localStorage.removeItem('flux_history');
      renderHistory(); showToast('History cleared');
    });

    // ── SAVE / SHARE / RETRY ─────────────────────────────────────────
    document.getElementById('save-btn').addEventListener('click', () => {
      if (!currentImgUrl) return;
      const a = document.createElement('a');
      a.href = currentImgUrl; a.download = `flux-${Date.now()}.jpg`;
      a.target = '_blank'; a.click(); showToast('Saving...');
    });

    document.getElementById('share-btn').addEventListener('click', async () => {
      if (!currentImgUrl) return;
      if (navigator.share) {
        try { await navigator.share({ title: 'FLUX Studio', url: currentImgUrl }); } catch {}
      } else {
        try { await copyToClipboard(currentImgUrl); showToast('Link copied!'); }
        catch { showToast('Could not copy link'); }
      }
    });

    document.getElementById('retry-btn').addEventListener('click', () => {
      document.getElementById('seed-select').value = 'random';
      enhancedPromptText = '';
      generate();
    });

    // ── TOAST ────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg; toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── PWA INSTALL ──────────────────────────────────────────────────
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      document.getElementById('install-banner').classList.add('visible');
    });
    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const r = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('visible');
      if (r.outcome === 'accepted') showToast('App installed! ⚡');
    });
    document.getElementById('install-close').addEventListener('click', () => {
      document.getElementById('install-banner').classList.remove('visible');
    });

    // ── INIT ─────────────────────────────────────────────────────────
    renderHistory();
  </script>
</body>
</html>
